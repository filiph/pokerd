name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish-and-homebrew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        
      - name: Install dependencies
        run: dart pub get
        
      - name: Publish to pub.dev
        run: dart pub publish --force
        
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} --generate-notes --title "pokerd ${{ github.ref_name }}"
        
      - name: Update Homebrew Formula
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}
        run: dart run grinder pkg-homebrew-update

  build-executables:
    needs: publish-and-homebrew
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            output: pokerd-linux-x64
          - os: ubuntu-24.04-arm
            output: pokerd-linux-arm64
          - os: macos-latest
            output: pokerd-macos-arm64
          - os: windows-latest
            output: pokerd-windows-x64.exe
          - os: windows-11-arm
            output: pokerd-windows-arm64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        
      - name: Install dependencies
        run: dart pub get
        
      - name: Compile executable
        run: dart compile exe bin/pokerd.dart -o ${{ matrix.output }}
        
      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} ${{ matrix.output }}
