name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        
      - name: Install dependencies
        run: dart pub get
        
      - name: Build and Release to GitHub
        env:
          GITHUB_BEARER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dart run grinder pkg-github-release
          dart run grinder pkg-github-linux
          dart run grinder pkg-github-macos
          dart run grinder pkg-github-windows
        
      - name: Publish to pub.dev
        run: dart pub publish --force
        
      - name: Update Homebrew Formula
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}
        run: dart run grinder pkg-homebrew-update
